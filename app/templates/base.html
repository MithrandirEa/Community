<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Community{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- HTMX embarqué localement — aucune connexion internet requise -->
    <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
</head>
<body class="role-{{ session.get('role', 'none') }}">

    {% block content %}{% endblock %}

    <!-- Transmission du token CSRF aux requêtes HTMX -->
    <script>
    document.addEventListener('htmx:configRequest', function (e) {
        var token = document.querySelector('meta[name="csrf-token"]');
        if (token) {
            e.detail.headers['X-CSRFToken'] = token.content;
        }
    });
    </script>

</body>
</html>
